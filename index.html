<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Agenda</title>
<meta name="theme-color" content="#FBFBF9">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agenda">
<style>
  :root {
    --paper: #FBFBF9;
    --ink: #1C1C1A;
    --ink-soft: #8A8A84;
    --ink-faint: #D8D8D2;
    --verde: #1F7A4D;
    --verde-soft: #E7F1EB;
    --panel: #F4F4F0;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    overflow: hidden;
    overscroll-behavior: none;
  }

  .app { display: flex; height: 100vh; height: 100dvh; }
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;               /* sin scroll horizontal: todo cabe en el ancho */
    overscroll-behavior-x: none;
    -webkit-overflow-scrolling: touch;
    padding: calc(20px + env(safe-area-inset-top)) 20px 160px;
  }
  .page { max-width: 640px; margin: 0 auto; }
  /* dentro de un pensamiento la hoja usa TODO el ancho de la pantalla:
     el texto se queda en su columna legible, pero el lienzo y las fotos
     libres pueden ir de lado a lado (importante en Mac). */
  .page.wide { max-width: none; margin: 0; }

  /* la hoja: contenido en flujo + lienzo superpuesto.
     min-height para poder dibujar en toda la pantalla aunque haya poco texto.
     Dentro de un pensamiento la altura la fija el JS (lienzo grande y crece solo). */
  .sheet { position: relative; min-height: calc(100vh - 210px); min-height: calc(100dvh - 210px); }
  .content { position: relative; z-index: 1; max-width: 640px; }
  .ink { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; display: block; }
  .ink.write { pointer-events: none; touch-action: auto; }
  .ink.draw  { pointer-events: auto; touch-action: none; cursor: crosshair; }

  /* cabecera */
  .date-line { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; padding-right: 76px; }
  .date-name { font-size: 27px; font-weight: 600; letter-spacing: -0.02em; }
  .date-name::first-letter { text-transform: uppercase; }
  .tab-date { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }
  .readonly-tag {
    font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    border: 1px solid var(--ink-faint); border-radius: 4px;
    padding: 2px 8px; cursor: pointer; background: none;
  }
  .readonly-tag:hover { color: var(--verde); border-color: var(--verde); }
  .rule { height: 1px; background: var(--ink-faint); margin: 18px 0 10px; }
  .hidden { display: none !important; }

  /* pestañas de pensamiento */
  .day-hint { color: var(--ink-soft); font-size: 15px; line-height: 1.5; padding: 4px 0 2px; max-width: 34em; }
  .tabs-row { display: flex; flex-wrap: wrap; gap: 10px; padding: 18px 0 4px; align-items: center; }
  .tab-chip {
    display: flex; align-items: center; gap: 0.55em;
    border-radius: 999px; border: 1px solid var(--ink-faint); background: var(--paper);
    padding: 0.55em 1em; font-size: 15px; font-family: inherit; color: var(--ink); cursor: pointer;
    touch-action: none; user-select: none; transition: box-shadow .12s, border-color .12s;
  }
  .tab-chip:hover { border-color: var(--verde); }
  .tab-chip.resizing { border-color: var(--verde); box-shadow: 0 0 0 3px var(--verde-soft); }
  .tab-chip .t-name::first-letter { text-transform: uppercase; }
  .tab-chip .t-meta { font-family: var(--mono); font-size: 0.68em; color: var(--ink-soft); }
  .tab-chip .t-del { color: var(--ink-soft); font-size: 1em; line-height: 1; padding: 0 2px; }
  .tab-chip .t-del:hover { color: var(--ink); }
  .tab-new { border-style: dashed; color: var(--ink-soft); font-size: 15px; }
  .tab-new:hover { color: var(--verde); }

  /* elementos libres (fotos y notas de texto) dentro de un pensamiento.
     Las fotos se pintan como fondo (no <img>) para que iOS no las secuestre. */
  .free-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .free-item {
    position: absolute; pointer-events: auto; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; -webkit-user-drag: none;
  }
  .free-item.grabbing { z-index: 4; }
  .free-photo {
    border-radius: 10px; cursor: grab;
    background: var(--panel) center/cover no-repeat; background-clip: padding-box;
    box-shadow: 0 2px 12px rgba(0,0,0,.14);
  }
  .free-photo.grabbing { box-shadow: 0 8px 26px rgba(0,0,0,.28); }
  .free-note {
    background: #FFFDF5; border: 1px solid var(--ink-faint); border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.10); padding: 12px 14px;
  }
  .free-note .note-text {
    width: 100%; border: none; outline: none; background: none; resize: none; overflow: hidden;
    font-family: inherit; font-size: 16px; line-height: 1.4; color: var(--ink);
    -webkit-user-select: text; user-select: text; touch-action: auto;
  }
  .free-note .note-text::placeholder { color: var(--ink-faint); }

  /* asas SUTILES: área táctil grande (34px) pero punto visible pequeño y
     translúcido, centrado en la esquina y fuera del contenido (no lo tapan). */
  .fi-handle {
    position: absolute; width: 34px; height: 34px; border: none; padding: 0;
    touch-action: none; -webkit-touch-callout: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; line-height: 1; cursor: pointer;
    opacity: .6; transition: opacity .15s;
  }
  .fi-handle::before {
    content: ""; position: absolute; width: 17px; height: 17px; border-radius: 50%;
    background: var(--verde); box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .fi-handle:hover, .free-item.grabbing .fi-handle, .free-item:hover .fi-handle { opacity: 1; }
  .fi-move   { left: -17px;  top: -17px;    cursor: move; }
  .fi-resize { right: -17px; bottom: -17px; cursor: nwse-resize; }
  .fi-del    { right: -17px; top: -17px; cursor: pointer; }
  .fi-del::before { background: rgba(28,28,26,.72); }
  .fi-move span, .fi-del span, .fi-resize span { position: relative; z-index: 1; }

  /* tareas / notas */
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; }
  .task:hover .task-del { opacity: 1; }
  .check {
    flex: none; width: 18px; height: 18px; margin-top: 3px;
    border: 1.5px solid var(--ink-soft); border-radius: 50%;
    background: none; cursor: pointer; position: relative;
  }
  .task.done .check { border-color: var(--verde); background: var(--verde); }
  .task.done .check::after {
    content: ""; position: absolute; left: 5px; top: 2px;
    width: 4px; height: 8px; border: solid #fff; border-width: 0 1.5px 1.5px 0;
    transform: rotate(42deg);
  }
  .task-text {
    flex: 1; font-size: 16px; line-height: 1.45;
    border: none; background: none; outline: none;
    color: var(--ink); font-family: inherit; resize: none; overflow: hidden;
  }
  .task.done .task-text { color: var(--ink-soft); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
  .task-del { flex: none; opacity: 0; border: none; background: none; color: var(--ink-soft); font-size: 16px; cursor: pointer; padding: 2px 6px; }
  @media (hover: none) { .task-del { opacity: 1; } }
  .task-del:hover { color: var(--ink); }

  .new-task { display: flex; align-items: center; gap: 10px; padding: 8px 0 4px; }
  .new-task .ghost-check { flex: none; width: 18px; height: 18px; border: 1.5px dashed var(--ink-faint); border-radius: 50%; }
  .new-task input {
    flex: 1; font-size: 16px; line-height: 1.45;
    border: none; background: none; outline: none; font-family: inherit; color: var(--ink);
  }
  .new-task input::placeholder { color: var(--ink-faint); }
  .mini-btn {
    flex: none; width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--ink-faint); background: var(--paper);
    color: var(--ink-soft); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .mini-btn:hover { border-color: var(--verde); color: var(--verde); }
  .mini-btn.rec { border-color: var(--verde); color: #fff; background: var(--verde); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  @media (prefers-reduced-motion: reduce) { .mini-btn.rec { animation: none; } }

  .empty-hint { color: var(--ink-faint); font-size: 15px; padding: 6px 0 2px 30px; user-select: none; }

  /* fotos */
  .photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; padding: 12px 0 4px; }
  .photo { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--panel); }
  .photo img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }
  .photo-del {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%;
    border: none; background: rgba(0,0,0,.55); color: #fff; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* barra de herramientas de dibujo (flotante, centrada, encima de la botonera) */
  .dock-tools {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(88px + env(safe-area-inset-bottom)); z-index: 41;
    display: none; align-items: center; gap: 6px;
    flex-wrap: wrap; justify-content: center; max-width: calc(100vw - 24px);
    background: var(--paper); border: 1px solid var(--ink-faint);
    border-radius: 12px; padding: 7px 9px; box-shadow: 0 4px 16px rgba(0,0,0,.10);
  }
  .dock-tools.show { display: flex; }
  .swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .swatch.sel { border-color: var(--ink); box-shadow: 0 0 0 2px var(--paper) inset; }
  .tool-btn { font-family: var(--mono); font-size: 12px; border: 1px solid var(--ink-faint); background: var(--paper); color: var(--ink); border-radius: 6px; padding: 5px 8px; cursor: pointer; }
  .tool-btn.sel { border-color: var(--verde); color: var(--verde); }
  .dock-sep { width: 1px; height: 20px; background: var(--ink-faint); }

  /* botonera flotante desplegable (dictar / escribir / foto / nota / dibujar) */
  .fab-cluster {
    position: fixed; right: calc(16px + env(safe-area-inset-right));
    bottom: calc(18px + env(safe-area-inset-bottom)); z-index: 42;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .fab-main {
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--ink); color: var(--paper); font-size: 28px; font-weight: 300;
    box-shadow: 0 4px 16px rgba(0,0,0,.22); display: flex; align-items: center; justify-content: center;
    transition: transform .34s cubic-bezier(.34,1.56,.64,1), background .2s;
  }
  .fab-cluster.open .fab-main { transform: rotate(135deg); }
  .fab-cluster.drawing .fab-main { background: var(--verde); font-size: 24px; transform: none; }
  .fab-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .fab-act {
    width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
    border: 1px solid var(--ink-faint); background: var(--paper); color: var(--ink); font-size: 20px;
    box-shadow: 0 3px 12px rgba(0,0,0,.14); display: flex; align-items: center; justify-content: center;
    transform: translateY(20px) scale(.4); opacity: 0; pointer-events: none;
    transition: transform .34s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  }
  .fab-cluster.open .fab-act { transform: none; opacity: 1; pointer-events: auto; }
  .fab-cluster.open .fab-act:nth-last-child(1) { transition-delay: .00s; }
  .fab-cluster.open .fab-act:nth-last-child(2) { transition-delay: .04s; }
  .fab-cluster.open .fab-act:nth-last-child(3) { transition-delay: .08s; }
  .fab-cluster.open .fab-act:nth-last-child(4) { transition-delay: .12s; }
  .fab-cluster.open .fab-act:nth-last-child(5) { transition-delay: .16s; }
  .fab-act:hover { border-color: var(--verde); color: var(--verde); }
  .fab-act.rec { border-color: var(--verde); color: #fff; background: var(--verde); animation: pulse 1.1s infinite; }
  .fab-cluster.drawing .fab-actions { display: none; }
  @media (prefers-reduced-motion: reduce) {
    .fab-main, .fab-act { transition: opacity .2s; }
    .fab-cluster.open .fab-main { transform: none; }
  }

  /* lightbox */
  .lightbox { position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; padding: 24px; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }

  /* toggle panel + sidebar */
  .toggle {
    position: fixed; top: calc(16px + env(safe-area-inset-top)); right: 16px; z-index: 30;
    border: 1px solid var(--ink-faint); background: var(--paper); border-radius: 8px;
    font-family: var(--mono); font-size: 12px; padding: 8px 12px; cursor: pointer; color: var(--ink);
  }
  .toggle:hover { border-color: var(--verde); }
  .toggle:focus-visible, .check:focus-visible, .day-item:focus-visible,
  .tool-btn:focus-visible, .swatch:focus-visible, .mini-btn:focus-visible, .draw-fab:focus-visible {
    outline: 2px solid var(--verde); outline-offset: 2px;
  }
  .sidebar { width: 0; overflow: hidden; background: var(--panel); border-left: 1px solid var(--ink-faint); transition: width .28s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .sidebar.open { width: 292px; }
  @media (prefers-reduced-motion: reduce) { .sidebar { transition: none; } }
  .sidebar-inner { width: 292px; padding: calc(64px + env(safe-area-inset-top)) 0 24px; overflow-y: auto; flex: 1; }
  .sidebar-close { margin: 0 22px 14px; }
  .sidebar-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); padding: 0 22px 12px; }
  .day-item { display: flex; justify-content: space-between; align-items: baseline; width: 100%; text-align: left; border: none; background: none; padding: 10px 22px; cursor: pointer; font-family: inherit; }
  .day-item:hover { background: var(--verde-soft); }
  .day-item.active { background: var(--verde-soft); box-shadow: inset 3px 0 0 var(--verde); }
  .day-item .d-name { font-size: 14px; color: var(--ink); }
  .day-item .d-name::first-letter { text-transform: uppercase; }
  .day-item .d-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }
  .day-item .d-meta .ok { color: var(--verde); }
  .sidebar-empty { padding: 6px 22px 10px; font-size: 13px; color: var(--ink-soft); }
  .sidebar-block { padding: 16px 22px 0; border-top: 1px solid var(--ink-faint); margin-top: 14px; }
  .sidebar-block summary { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; }
  .sidebar-block summary::-webkit-details-marker { display: none; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); flex: none; }
  .sync-dot.on { background: var(--verde); } .sync-dot.err { background: #C4452E; }
  .sidebar-block .inner { padding: 12px 0 4px; display: flex; flex-direction: column; gap: 8px; }
  .sidebar-block textarea, .sidebar-block input[type=text] { width: 100%; font-family: var(--mono); font-size: 11px; border: 1px solid var(--ink-faint); border-radius: 6px; padding: 8px; background: #fff; color: var(--ink); outline: none; resize: vertical; }
  .sidebar-block textarea:focus, .sidebar-block input:focus { border-color: var(--verde); }
  .sidebar-block .row { display: flex; gap: 6px; } .sidebar-block .row input { flex: 1; }
  .sync-msg { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); line-height: 1.5; }
  .storage-note { padding: 14px 22px 0; font-family: var(--mono); font-size: 10px; color: var(--ink-soft); }

  @media (max-width: 640px) {
    .sidebar.open { width: 100%; position: fixed; right: 0; top: 0; bottom: 0; z-index: 50; }
    .date-name { font-size: 22px; }
    /* barra de dibujo compacta en iPhone (que no se achate) */
    .dock { left: 8px; right: 8px; transform: none; justify-content: center; }
    .dock-tools { gap: 5px; padding: 6px 7px; max-width: 100%; }
    .swatch { width: 22px; height: 22px; }
    .tool-btn { font-size: 11px; padding: 5px 7px; }
    .dock-sep { height: 18px; }
    .draw-fab { width: 46px; height: 46px; font-size: 18px; }
  }
</style>
</head>
<body>
<div class="app">
  <main class="scroll-area" id="scrollArea">
    <div class="page" id="page">
      <div class="sheet" id="sheet">
        <canvas class="ink write" id="ink"></canvas>
        <div class="content" id="content">
          <div class="date-line">
            <h1 class="date-name" id="dateName"></h1>
            <span class="tab-date hidden" id="tabDate"></span>
            <button class="readonly-tag hidden" id="exitTab">← pensamientos</button>
          </div>
          <div class="rule"></div>
          <div class="tabs-row hidden" id="tabsRow"></div>

          <div class="day-hint hidden" id="dayHint">Toca un pensamiento para entrar, o crea uno nuevo. Aquí dentro no se escribe ni se dibuja: todo va dentro de los pensamientos.</div>

          <div id="taskList"></div>
          <div class="new-task hidden" id="newTaskRow">
            <span class="ghost-check"></span>
            <input type="text" id="newTaskInput" placeholder="Escribe una tarea o nota…" autocomplete="off">
          </div>
          <input type="file" id="photoInput" accept="image/*" class="hidden">

          <div class="photos hidden" id="photos"></div>
        </div>
        <div class="free-layer" id="freeLayer"></div>
      </div>
    </div>
  </main>

  <!-- barra de herramientas de dibujo (aparece en modo dibujo) -->
  <div class="dock-tools" id="dockTools">
    <button class="swatch sel" data-color="#1C1C1A" style="background:#1C1C1A" aria-label="Tinta"></button>
    <button class="swatch" data-color="#1F7A4D" style="background:#1F7A4D" aria-label="Verde"></button>
    <button class="swatch" data-color="#C4452E" style="background:#C4452E" aria-label="Rojo"></button>
    <button class="swatch" data-color="#2B5F8A" style="background:#2B5F8A" aria-label="Azul"></button>
    <span class="dock-sep"></span>
    <button class="tool-btn" data-size="3">·</button>
    <button class="tool-btn sel" data-size="6">••</button>
    <button class="tool-btn" data-size="14">●</button>
    <span class="dock-sep"></span>
    <button class="tool-btn" id="eraserBtn">goma</button>
    <button class="tool-btn hidden" id="moveBtn">✥ mover</button>
    <button class="tool-btn" id="undoBtn">↶</button>
    <button class="tool-btn" id="clearBtn">✕</button>
  </div>

  <!-- botonera flotante: se despliega hacia arriba con animación orgánica -->
  <div class="fab-cluster" id="fabCluster">
    <div class="fab-actions" id="fabActions">
      <button class="fab-act" id="actWrite" title="Escribir" aria-label="Escribir">✏️</button>
      <button class="fab-act hidden" id="actMic" title="Dictar" aria-label="Dictar">🎙</button>
      <button class="fab-act" id="actNote" title="Nota de texto" aria-label="Nota de texto">💬</button>
      <button class="fab-act" id="actPhoto" title="Foto" aria-label="Foto">📷</button>
      <button class="fab-act" id="actDraw" title="Dibujar" aria-label="Dibujar">✎</button>
    </div>
    <button class="fab-main" id="fabMain" aria-label="Acciones" aria-expanded="false">+</button>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

  <button class="toggle" id="toggleBtn" aria-expanded="false">menú</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <button class="tool-btn sidebar-close" id="sidebarClose">✕ salir</button>

      <details class="sidebar-block" id="syncBlock">
        <summary><span class="sync-dot" id="syncDot"></span> Sincronización</summary>
        <div class="inner">
          <div class="sync-msg" id="syncMsg">Sin configurar. Pega tu firebaseConfig (tal cual, con los import y todo) y usa la misma clave en ambos dispositivos.</div>
          <textarea id="fbConfig" rows="4" placeholder="pega aquí el bloque de Firebase"></textarea>
          <div class="row">
            <input type="text" id="syncKey" placeholder="clave de sincronización">
            <button class="tool-btn" id="genKey">generar</button>
          </div>
          <button class="tool-btn" id="connectBtn">conectar</button>
        </div>
      </details>

      <div class="sidebar-block">
        <div class="inner" style="padding-top:0">
          <button class="tool-btn" id="soundBtn">🔊 sonido: activado</button>
          <button class="tool-btn" id="exportBtn">⤓ exportar copia (.json)</button>
          <button class="tool-btn" id="importBtn">⤒ importar copia</button>
          <input type="file" id="importFile" accept="application/json" class="hidden">
        </div>
      </div>

      <div class="storage-note" id="storageNote"></div>
    </div>
  </aside>
</div>

<script type="module">
(function () {
  // ================= almacenamiento local (local-first) =================
  const KEY = 'agenda-days';
  let localMode = 'sin persistencia';
  let ls = null;
  try { ls = window.localStorage; ls.setItem('__t','1'); ls.removeItem('__t'); } catch (e) { ls = null; }
  if (ls) localMode = 'local: este dispositivo';
  let mem = {};
  const local = {
    load() { if (ls) { try { return JSON.parse(ls.getItem(KEY) || '{}'); } catch (e) { return {}; } } return mem; },
    save(d) { if (ls) { try { ls.setItem(KEY, JSON.stringify(d)); } catch (e) {} } else mem = d; },
    getPref(k) { return ls ? ls.getItem(k) : null; },
    setPref(k, v) { if (ls) ls.setItem(k, v); }
  };

  // ================= estado =================
  // Todo vive en una única hoja persistente HOME. Los pensamientos ya NO se
  // segmentan por día: la fecha de arriba es solo cosmética (hoy).
  // days[HOME] = { items, strokes, photos:[{id,img,u,tab?,x?,y?,w?,h?}],
  //               tabs:[{id,name,items,strokes,size?,created?}], u }
  const HOME = 'home';
  let days = {};
  let viewKey = HOME;
  let viewTab = null; // id de la pestaña de pensamiento abierta (null = hoja principal)

  function todayKey() { const d = new Date(); const p = n => String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
  function keyToDate(k) { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d); }
  function fmtName(k)  { return keyToDate(k).toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' }); }
  function fmtShort(k) { return keyToDate(k).toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short', year:'numeric' }); }
  function isDateKey(k) { return /^\d{4}-\d{2}-\d{2}$/.test(k); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function day() { if (!days[HOME]) days[HOME] = { items:[], strokes:[], photos:[], tabs:[], u:0 }; return days[HOME]; }
  function dayHasContent(k) { const d = days[k]; if (!d) return false; return (d.items&&d.items.length) || (d.strokes&&d.strokes.length) || (d.photos&&d.photos.length) || (d.tabs&&d.tabs.length); }

  // migración/consolidación: dobla los pensamientos y sus fotos de cualquier
  // clave antigua (por fecha) dentro de HOME. Idempotente (dedupe por id).
  function foldIntoHome() {
    const home = day(); if (!home.tabs) home.tabs = []; if (!home.photos) home.photos = [];
    let moved = false;
    Object.keys(days).forEach(k => {
      if (k === HOME) return; const d = days[k]; if (!d) return;
      (d.tabs||[]).forEach(t => {
        if (!home.tabs.some(x => x.id === t.id)) {
          if (!t.created) t.created = isDateKey(k) ? k : todayKey();
          home.tabs.push(t); moved = true;
        }
      });
      (d.photos||[]).forEach(p => {
        if (p.tab && !home.photos.some(x => x.id === p.id)) { home.photos.push(p); moved = true; }
      });
    });
    return moved;
  }
  // contenedor activo: la pestaña de pensamiento abierta o la hoja del día
  function cur() { const d = day(); if (viewTab) { const t = (d.tabs||[]).find(t => t.id === viewTab); if (t) return t; viewTab = null; } return d; }
  function curRead() { const d = days[viewKey]; if (!d) return { items:[], strokes:[] }; if (viewTab) { const t = (d.tabs||[]).find(t => t.id === viewTab); if (t) return t; } return d; }

  let saveTimer = null;
  function persist(k) { k = k || viewKey; if (days[k]) days[k].u = Date.now(); local.save(days); pushDay(k); }
  function persistDebounced() { clearTimeout(saveTimer); saveTimer = setTimeout(() => persist(), 500); }

  const $ = id => document.getElementById(id);

  // ================= efectos de sonido (sintetizados, sin archivos) =================
  let actx = null, soundOn = (local.getPref('agenda-sound') !== '0');
  function ensureAudio() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; } }
    if (actx && actx.state === 'suspended') actx.resume().catch(()=>{});
  }
  // desbloquea el audio en el primer toque (política de autoplay del navegador)
  window.addEventListener('pointerdown', ensureAudio, { once: false });
  function blip(freq, dur, type, vol, slideTo) {
    if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.09, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sfx(kind) {
    if (!soundOn) return;
    ensureAudio(); if (!actx) return;
    switch (kind) {
      case 'open':   blip(560, 0.12, 'sine', 0.08, 880); break;   // entrar en un pensamiento
      case 'create': blip(440, 0.10, 'triangle', 0.09, 660); setTimeout(()=>blip(880,0.10,'sine',0.07),90); break;
      case 'photo':  blip(700, 0.09, 'sine', 0.08, 1040); break;  // foto añadida
      case 'pickup': blip(320, 0.07, 'sine', 0.07, 420); break;   // coger (mover/redimensionar)
      case 'drop':   blip(420, 0.09, 'sine', 0.07, 300); break;   // soltar
      default: blip(500, 0.08, 'sine', 0.07);
    }
  }

  // ================= sincronización (Firestore) =================
  let fb = null;            // { fs, db, key, unsub, unsubP }
  function setSync(state, msg) {
    $('syncDot').className = 'sync-dot' + (state==='on'?' on':state==='err'?' err':'');
    if (msg) $('syncMsg').textContent = msg;
    $('storageNote').textContent = localMode + (state==='on'?' · sync: activa':'');
  }

  // las pestañas también viajan como string JSON ('t'): sus strokes tienen arrays anidados
  function serializeDay(d) { return { items: d.items||[], s: JSON.stringify(d.strokes||[]), t: JSON.stringify(d.tabs||[]), u: d.u||Date.now() }; }
  function deserializeDay(r) {
    let s=[], t=[];
    try { s = r.s ? JSON.parse(r.s) : []; } catch(e){}
    try { t = r.t ? JSON.parse(r.t) : []; } catch(e){}
    return { items: r.items||[], strokes: s, tabs: t, u: r.u||0 };
  }

  function pushDay(k) {
    if (!fb) return;
    const ref = fb.fs.doc(fb.db, 'agendas', fb.key, 'days', k);
    const d = days[k];
    if (!d) { fb.fs.deleteDoc(ref).catch(()=>{}); return; }
    fb.fs.setDoc(ref, serializeDay(d)).catch(()=> setSync('err','Error al escribir. Revisa las reglas de Firestore.'));
  }
  function pushPhoto(dayKey, photo) {
    if (!fb) return;
    const ref = fb.fs.doc(fb.db, 'agendas', fb.key, 'photos', photo.id);
    const doc = { day: dayKey, img: photo.img, u: photo.u };
    if (photo.tab) doc.tab = photo.tab;
    if (photo.x != null) { doc.x = photo.x; doc.y = photo.y; doc.w = photo.w; doc.h = photo.h || photo.w; }
    fb.fs.setDoc(ref, doc).catch(()=> setSync('err','No se pudo subir la foto. ¿Actualizaste las reglas a la versión con {document=**}?'));
  }
  function deletePhotoRemote(id) {
    if (!fb) return;
    fb.fs.deleteDoc(fb.fs.doc(fb.db, 'agendas', fb.key, 'photos', id)).catch(()=>{});
  }

  // acepta el bloque tal cual lo da Firebase (JS, JSON, comillas tipograficas, etc.)
  function parseFirebaseConfig(raw) {
    let t = String(raw).replace(/[\u201C\u201D\u2033]/g,'"').replace(/[\u2018\u2019\u2032]/g,"'").trim();
    let start = -1;
    const eq = t.search(/firebaseConfig\s*=/);
    if (eq !== -1) start = t.indexOf('{', eq);
    if (start === -1) start = t.indexOf('{');
    if (start === -1) throw new Error('sin objeto');
    let depth=0, inStr=false, q='', end=-1;
    for (let i=start; i<t.length; i++) {
      const c = t[i];
      if (inStr) { if (c==='\\') i++; else if (c===q) inStr=false; }
      else if (c==='"'||c==="'") { inStr=true; q=c; }
      else if (c==='{') depth++;
      else if (c==='}') { depth--; if (depth===0) { end=i; break; } }
    }
    if (end===-1) throw new Error('objeto sin cerrar');
    t = t.slice(start, end+1);
    try { return JSON.parse(t); } catch(e){}
    const j = t.replace(/([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g,'$1"$2":').replace(/'/g,'"').replace(/,(\s*[}\]])/g,'$1');
    return JSON.parse(j);
  }

  async function connectSync() {
    const cfgRaw = (local.getPref('agenda-fb-config')||'').trim();
    const key = (local.getPref('agenda-sync-key')||'').trim();
    if (!cfgRaw || !key) return;
    if (key.length < 30) { setSync('err','La clave debe tener al menos 30 caracteres. Usa "generar".'); return; }
    let cfg;
    try { cfg = parseFirebaseConfig(cfgRaw); }
    catch (e) { setSync('err','No se pudo leer el firebaseConfig. Pega el bloque completo que te dio Firebase.'); return; }
    if (!cfg.projectId || !cfg.apiKey) { setSync('err','Al firebaseConfig le faltan datos (projectId o apiKey).'); return; }

    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js');
      const fs = await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js');
      const app = initializeApp(cfg);
      let db;
      try { db = fs.initializeFirestore(app, { localCache: fs.persistentLocalCache() }); }
      catch (e) { db = fs.getFirestore(app); }
      fb = { fs, db, key, unsub: null, unsubP: null };

      // ---- días (texto + trazos) ----
      let firstDays = true;
      const daysCol = fs.collection(db, 'agendas', key, 'days');
      fb.unsub = fs.onSnapshot(daysCol, snap => {
        let changed = false; const remote = new Set();
        snap.docChanges().forEach(ch => {
          const k = ch.doc.id; remote.add(k);
          if (ch.doc.metadata.hasPendingWrites) return;
          if (ch.type === 'removed') { if (days[k] && k!==viewKey) { delete days[k]; changed=true; } return; }
          const r = deserializeDay(ch.doc.data());
          const localDay = days[k];
          if (!localDay || (r.u||0) > (localDay.u||0)) {
            r.photos = (localDay && localDay.photos) || []; // preservar fotos (van por su cuenta)
            days[k] = r; changed = true;
          }
        });
        if (firstDays) {
          snap.docs.forEach(d => remote.add(d.id));
          Object.keys(days).forEach(k => { if (!remote.has(k) && ((days[k].items&&days[k].items.length)||(days[k].strokes&&days[k].strokes.length)||(days[k].tabs&&days[k].tabs.length))) pushDay(k); });
          firstDays = false;
        }
        if (changed) { local.save(days); if (!drawing && !moveTarget) render(); }
      }, () => setSync('err','Sin acceso a Firestore. Revisa reglas y configuración.'));

      // ---- fotos (una por documento, para no superar 1 MB) ----
      let firstPhotos = true;
      const photosCol = fs.collection(db, 'agendas', key, 'photos');
      fb.unsubP = fs.onSnapshot(photosCol, snap => {
        let changed = false;
        snap.docChanges().forEach(ch => {
          if (ch.doc.metadata.hasPendingWrites) return;
          const id = ch.doc.id; const data = ch.doc.data(); const dk = data.day;
          if (!dk) return;
          if (!days[dk]) days[dk] = { items:[], strokes:[], photos:[], u:0 };
          if (!days[dk].photos) days[dk].photos = [];
          if (ch.type === 'removed') {
            const before = days[dk].photos.length;
            days[dk].photos = days[dk].photos.filter(p => p.id !== id);
            if (days[dk].photos.length !== before) changed = true;
          } else {
            const ex = days[dk].photos.find(p => p.id === id);
            if (!ex) {
              const p = { id, img: data.img, u: data.u||0 };
              if (data.tab) p.tab = data.tab;
              if (data.x != null) { p.x = data.x; p.y = data.y; p.w = data.w; p.h = data.h; }
              days[dk].photos.push(p); changed = true;
            } else if ((data.u||0) > (ex.u||0)) {
              ex.u = data.u||0; ex.img = data.img;
              if (data.tab) ex.tab = data.tab; else delete ex.tab;
              if (data.x != null) { ex.x = data.x; ex.y = data.y; ex.w = data.w; ex.h = data.h; }
              changed = true;
            }
          }
        });
        if (firstPhotos) {
          const remote = new Set(snap.docs.map(d => d.id));
          Object.keys(days).forEach(k => (days[k].photos||[]).forEach(p => { if (!remote.has(p.id)) pushPhoto(k, p); }));
          firstPhotos = false;
        }
        if (changed) { local.save(days); if (!drawing && !moveTarget) render(); }
      }, () => {});

      setSync('on','Conectado. Los cambios se sincronizan al instante entre dispositivos.');
    } catch (e) {
      setSync('err','No se pudo cargar Firebase (¿sin conexión la primera vez?).');
    }
  }

  // ================= render =================
  function render() {
    foldIntoHome();
    const d = days[HOME];
    let tab = null;
    if (viewTab) { tab = ((d && d.tabs) || []).find(t => t.id === viewTab) || null; if (!tab) viewTab = null; }
    const inTab = !!tab;
    $('dateName').textContent = tab ? (tab.name || 'pensamiento') : fmtName(todayKey());
    $('dateName').style.cursor = tab ? 'pointer' : '';
    $('dateName').title = tab ? 'Tocar para renombrar' : '';
    $('tabDate').classList.toggle('hidden', !inTab);
    if (inTab) $('tabDate').textContent = tab.created ? ('creado ' + fmtShort(tab.created)) : '';
    $('exitTab').classList.toggle('hidden', !inTab);
    $('moveBtn').classList.toggle('hidden', !inTab);

    // dentro de un pensamiento la hoja usa todo el ancho de la pantalla
    $('page').classList.toggle('wide', inTab);

    // escribir / dibujar / fotos SOLO dentro de un pensamiento; la hoja principal es solo el índice
    if (!inTab) taskInputOpen = false;
    $('newTaskRow').classList.toggle('hidden', !(inTab && taskInputOpen));
    $('taskList').classList.toggle('hidden', !inTab);
    $('fabCluster').classList.toggle('hidden', !inTab);
    $('dayHint').classList.toggle('hidden', inTab);
    if (!inTab) { if (drawMode) setDrawMode(false); if (tool === 'move') setTool('pen'); closeFab(); }

    renderTabs();
    renderTasks();
    renderPhotos();
    updateSheetHeight();
    resizeInk();
  }

  // dentro de un pensamiento la hoja es un lienzo grande que crece según el
  // contenido, para poder dibujar y mover imágenes muy por debajo del texto
  function updateSheetHeight() {
    if (!viewTab) { sheet.style.minHeight = ''; return; }
    const w = sheet.clientWidth || cssW || 1;
    let maxY = 0;
    (curRead().strokes||[]).forEach(s => s.p.forEach(pt => { if (pt[1] > maxY) maxY = pt[1]; }));
    (day().photos||[]).filter(p => p.tab === viewTab).forEach(p => { const b = (p.y||0)+(p.h||p.w||0); if (b > maxY) maxY = b; });
    const tab = (day().tabs||[]).find(t => t.id === viewTab);
    if (tab) (tab.notes||[]).forEach(n => { const el = photoEls.get(n.id); const hPx = el ? el.offsetHeight : 60; const b = (n.y||0) + hPx/w*LW; if (b > maxY) maxY = b; });
    const contentPx = maxY / LW * w;
    const floor = Math.max(window.innerHeight * 1.5, 1100);
    sheet.style.minHeight = Math.round(Math.max(floor, contentPx + 500)) + 'px';
  }

  // ================= pestañas de pensamiento =================
  function renderTabs() {
    const row = $('tabsRow');
    row.innerHTML = '';
    row.classList.toggle('hidden', !!viewTab);
    if (viewTab) return;
    const d = days[HOME] || {};
    (d.tabs||[]).forEach(t => {
      const chip = document.createElement('button'); chip.className = 'tab-chip';
      chip.style.fontSize = (15 * (t.size || 1)) + 'px';
      const nm = document.createElement('span'); nm.className = 't-name'; nm.textContent = t.name || 'pensamiento';
      const items = t.items||[]; const done = items.filter(i=>i.done).length;
      let m = ''; if (items.length) m += done+'/'+items.length;
      if ((t.strokes||[]).length) m += (m?' · ':'')+'✎';
      if ((d.photos||[]).some(p => p.tab === t.id)) m += (m?' · ':'')+'📷';
      chip.appendChild(nm);
      if (m) { const meta = document.createElement('span'); meta.className='t-meta'; meta.textContent = m; chip.appendChild(meta); }
      const del = document.createElement('span'); del.className='t-del'; del.textContent='×';
      del.onpointerdown = ev => ev.stopPropagation();
      del.onclick = ev => { ev.stopPropagation(); deleteTab(t.id); };
      chip.appendChild(del);
      attachBubbleGestures(chip, t);
      row.appendChild(chip);
    });
    const add = document.createElement('button'); add.className = 'tab-chip tab-new'; add.textContent = '+ pensamiento';
    add.onclick = createTab;
    row.appendChild(add);
  }

  // toque corto = abrir; pulsación larga = redimensionar la burbuja arrastrando
  function attachBubbleGestures(chip, t) {
    let timer = null, resizing = false, startX = 0, startSize = 0, moved = false, downId = null;
    const startResize = () => {
      resizing = true; chip.classList.add('resizing'); sfx('pickup');
      if (navigator.vibrate) navigator.vibrate(12);
    };
    chip.addEventListener('pointerdown', e => {
      downId = e.pointerId; moved = false; resizing = false;
      startX = e.clientX; startSize = t.size || 1;
      chip.setPointerCapture(e.pointerId);
      timer = setTimeout(startResize, 380);
    });
    chip.addEventListener('pointermove', e => {
      if (e.pointerId !== downId) return;
      if (!resizing) {
        if (Math.abs(e.clientX - startX) > 8) { moved = true; clearTimeout(timer); }
        return;
      }
      e.preventDefault();
      const s = Math.max(0.8, Math.min(2.4, startSize + (e.clientX - startX) / 140));
      t.size = Math.round(s * 100) / 100;
      chip.style.fontSize = (15 * t.size) + 'px';
    });
    const end = e => {
      if (e.pointerId !== downId) return;
      clearTimeout(timer); downId = null;
      if (resizing) { resizing = false; chip.classList.remove('resizing'); sfx('drop'); persist(); }
      else if (!moved) { sfx('open'); viewTab = t.id; render(); }
    };
    chip.addEventListener('pointerup', end);
    chip.addEventListener('pointercancel', e => { clearTimeout(timer); if (resizing) { resizing=false; chip.classList.remove('resizing'); } downId=null; });
  }

  function createTab() {
    const name = prompt('Nombre del pensamiento', '');
    if (name === null) return;
    const t = { id: uid(), name: name.trim() || 'pensamiento', items: [], strokes: [], size: 1, created: todayKey() };
    const d = day(); if (!d.tabs) d.tabs = [];
    d.tabs.push(t);
    viewTab = t.id;
    sfx('create'); persist(); render();
  }
  function deleteTab(id) {
    const d = days[HOME]; if (!d) return;
    const t = (d.tabs||[]).find(t => t.id === id);
    if (!confirm('¿Eliminar el pensamiento' + (t && t.name ? ' «'+t.name+'»' : '') + '? Se borra su contenido.')) return;
    d.tabs = (d.tabs||[]).filter(t => t.id !== id);
    (d.photos||[]).filter(p => p.tab === id).forEach(p => deletePhotoRemote(p.id));
    d.photos = (d.photos||[]).filter(p => p.tab !== id);
    if (viewTab === id) viewTab = null;
    persist(); render();
  }

  function renderTasks() {
    const d = curRead();
    const list = $('taskList'); list.innerHTML = '';
    if ((d.items||[]).length === 0) {
      const h = document.createElement('div'); h.className='empty-hint';
      h.textContent = 'Página en blanco. Escribe, dicta o dibuja.';
      list.appendChild(h);
    }
    (d.items||[]).forEach(item => {
      const row = document.createElement('div'); row.className = 'task' + (item.done?' done':'');
      const check = document.createElement('button'); check.className='check';
      check.setAttribute('aria-label', item.done?'Marcar como pendiente':'Marcar como hecha');
      check.onclick = () => { item.done=!item.done; persist(); render(); };
      const txt = document.createElement('textarea'); txt.className='task-text'; txt.rows=1; txt.value=item.text;
      txt.oninput = () => { autoGrow(txt); item.text=txt.value; persistDebounced(); };
      txt.onkeydown = e => {
        if (e.key==='Enter') { e.preventDefault(); $('newTaskInput').focus(); }
        if (e.key==='Backspace' && txt.value==='') { e.preventDefault(); removeItem(item.id); }
      };
      const del = document.createElement('button'); del.className='task-del'; del.textContent='×';
      del.setAttribute('aria-label','Eliminar'); del.onclick = () => removeItem(item.id);
      row.append(check, txt, del); list.appendChild(row); autoGrow(txt);
    });
  }
  function autoGrow(el) { el.style.height='auto'; el.style.height = el.scrollHeight+'px'; }

  function renderPhotos() {
    // toda foto real vive dentro de un pensamiento (posición libre); la rejilla
    // clásica ya no se usa. Se mantiene oculta (datos heredados sin tab).
    $('photos').classList.add('hidden');
    renderFreeItems();
  }

  // clamp horizontal: el elemento no se sale del ancho de la hoja (simétrico izq/der)
  function clampX(x, w) { return Math.max(0, Math.min(x, Math.max(0, LW - w))); }
  function positionItem(el, it, isPhoto) {
    el.style.left = (clampX(it.x, it.w)/LW*100) + '%';
    el.style.top = (it.y/LW*cssW) + 'px';
    el.style.width = (it.w/LW*100) + '%';
    if (isPhoto) el.style.aspectRatio = (it.w||1) + ' / ' + (it.h||it.w||1);
  }
  function saveItem(it, isPhoto) {
    movingFree = false;
    if (isPhoto) { it.u = Date.now(); local.save(days); pushPhoto(HOME, it); }
    else persist();
    updateSheetHeight(); resizeInk();
  }
  function mkHandle(cls, txt, title) { const h=document.createElement('div'); h.className='fi-handle '+cls; if(txt){ const s=document.createElement('span'); s.textContent=txt; h.appendChild(s); } h.title=title; return h; }
  function mkDel(fn) { const b=document.createElement('button'); b.className='fi-handle fi-del'; const s=document.createElement('span'); s.textContent='×'; b.appendChild(s); b.setAttribute('aria-label','Eliminar'); b.onpointerdown=ev=>ev.stopPropagation(); b.onclick=ev=>{ ev.stopPropagation(); fn(); }; return b; }
  function isHandle(t) { return t && t.closest && t.closest('.fi-handle, .note-text'); }

  function renderFreeItems() {
    const layer = $('freeLayer'); layer.innerHTML = ''; photoEls.clear();
    if (!viewTab) return;
    const d = days[HOME] || {};
    const tab = (d.tabs||[]).find(t => t.id === viewTab);
    // --- fotos ---
    (d.photos||[]).filter(p => p.tab === viewTab).forEach(p => {
      if (p.x == null) { p.x = 60; p.y = 60; p.w = 420; p.h = p.h || 420; }
      const el = document.createElement('div'); el.className = 'free-item free-photo';
      el.style.backgroundImage = 'url("' + p.img + '")';
      positionItem(el, p, true);
      el.addEventListener('contextmenu', ev => ev.preventDefault());
      const move = mkHandle('fi-move','✥','Mover');
      const del = mkDel(() => removePhoto(p.id));
      const grip = mkHandle('fi-resize','','Redimensionar');
      el.append(move, del, grip); layer.appendChild(el); photoEls.set(p.id, el);
      el.addEventListener('click', e => { if (isHandle(e.target)) return; $('lightboxImg').src = p.img; $('lightbox').classList.add('show'); });
      attachMove(el, move, p, true);
      attachResize(el, grip, p, true);
    });
    // --- notas de texto ---
    if (tab) (tab.notes||[]).forEach(n => {
      if (n.x == null) { n.x = 80; n.y = 80; n.w = 360; }
      const el = document.createElement('div'); el.className = 'free-item free-note';
      positionItem(el, n, false);
      const ta = document.createElement('textarea'); ta.className = 'note-text'; ta.rows = 1; ta.value = n.text||''; ta.placeholder = 'Escribe…';
      ta.addEventListener('input', () => { autoGrow(ta); n.text = ta.value; persistDebounced(); updateSheetHeight(); });
      ta.addEventListener('pointerdown', e => e.stopPropagation()); // editar sin arrastrar
      const move = mkHandle('fi-move','✥','Mover');
      const del = mkDel(() => removeNote(n.id));
      const grip = mkHandle('fi-resize','','Ancho');
      el.append(ta, move, del, grip); layer.appendChild(el); photoEls.set(n.id, el);
      autoGrow(ta);
      attachMove(el, move, n, false);
      attachResize(el, grip, n, false);
    });
  }

  // asa ✥ (arriba-izq) = mover; asa (abajo-der) = tamaño. Asas dedicadas para
  // que iOS no secuestre el gesto y para no tapar el contenido.
  function attachMove(el, handle, it, isPhoto) {
    let id=null, sx=0, sy=0, ox=0, oy=0;
    handle.addEventListener('pointerdown', e => {
      e.stopPropagation(); e.preventDefault();
      id=e.pointerId; sx=e.clientX; sy=e.clientY; ox=it.x; oy=it.y;
      handle.setPointerCapture(e.pointerId); movingFree=true; el.classList.add('grabbing');
      sfx('pickup'); if (navigator.vibrate) navigator.vibrate(10);
    });
    handle.addEventListener('pointermove', e => {
      if (e.pointerId !== id) return; e.preventDefault();
      it.x = clampX(ox + (e.clientX-sx)/cssW*LW, it.w);
      it.y = Math.max(0, oy + (e.clientY-sy)/cssW*LW);
      positionItem(el, it, isPhoto); updateSheetHeight();
    });
    handle.addEventListener('pointerup', e => { if (e.pointerId!==id) return; id=null; el.classList.remove('grabbing'); sfx('drop'); saveItem(it, isPhoto); });
    handle.addEventListener('pointercancel', e => { id=null; movingFree=false; el.classList.remove('grabbing'); });
  }
  function attachResize(el, handle, it, isPhoto) {
    let id=null, sx=0, sy=0, sW=0, aspect0=1;
    handle.addEventListener('pointerdown', e => {
      e.stopPropagation(); e.preventDefault();
      id=e.pointerId; sx=e.clientX; sy=e.clientY; sW=it.w; aspect0 = (isPhoto && it.h && it.w) ? it.h/it.w : 1;
      handle.setPointerCapture(e.pointerId); movingFree=true; el.classList.add('grabbing'); sfx('pickup');
    });
    handle.addEventListener('pointermove', e => {
      if (e.pointerId !== id) return; e.preventDefault();
      // el asa está abajo-derecha: arrastrar en horizontal O en vertical redimensiona
      const dx = e.clientX - sx, dy = e.clientY - sy;
      const delta = Math.abs(dx) >= Math.abs(dy) ? dx : dy;
      it.w = Math.max(isPhoto?120:140, Math.min(LW, sW + delta/cssW*LW));
      if (isPhoto) it.h = Math.round(it.w * aspect0);
      positionItem(el, it, isPhoto); updateSheetHeight();
    });
    handle.addEventListener('pointerup', e => { if (e.pointerId!==id) return; id=null; el.classList.remove('grabbing'); sfx('drop'); saveItem(it, isPhoto); });
    handle.addEventListener('pointercancel', e => { id=null; movingFree=false; el.classList.remove('grabbing'); });
  }
  function repositionPhotos() {
    const d = days[HOME] || {}; const tab = (d.tabs||[]).find(t => t.id === viewTab);
    photoEls.forEach((el, id) => {
      let it = (d.photos||[]).find(p => p.id === id), isPhoto = true;
      if (!it && tab) { it = (tab.notes||[]).find(n => n.id === id); isPhoto = false; }
      if (it) positionItem(el, it, isPhoto);
    });
  }
  function createNote() {
    const tab = cur(); if (!tab || !viewTab) return;
    if (!tab.notes) tab.notes = [];
    const y = Math.max(0, Math.round(scrollArea.scrollTop / cssW * LW)) + 120;
    const n = { id: uid(), text:'', x: 60, y, w: 360, created: todayKey() };
    tab.notes.push(n);
    sfx('create'); persist(); render();
    setTimeout(() => { const el = photoEls.get(n.id); const ta = el && el.querySelector('.note-text'); if (ta) ta.focus(); }, 40);
  }
  function removeNote(id) {
    const tab = cur(); if (!tab || !tab.notes) return;
    tab.notes = tab.notes.filter(n => n.id !== id);
    persist(); render();
  }

  // ================= tareas =================
  function addItem(text) { if (!text.trim()) return; const c = cur(); if (!c.items) c.items = []; c.items.push({ id:uid(), text:text.trim(), done:false }); persist(); render(); }
  function removeItem(id) {
    const c = curRead(); if (!c.items) return;
    c.items = c.items.filter(i => i.id!==id);
    persist();
    render();
  }

  // ================= fotos =================
  // compresión: baja dimensiones y busca la calidad más alta que quepa en ~150 KB
  function compressImage(img) {
    const TARGET = 150 * 1024;
    let best = null;
    for (const max of [1000, 800, 640]) {
      const k = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.round(img.width*k), h = Math.round(img.height*k);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      for (const q of [0.7, 0.58, 0.46, 0.36]) {
        const data = c.toDataURL('image/jpeg', q);
        best = data;
        if (data.length * 0.75 <= TARGET) return data;
      }
    }
    return best;
  }
  function addPhotoFile(file) {
    if (!file) return;
    const rd = new FileReader();
    rd.onload = () => {
      const img = new Image();
      img.onload = () => {
        const c = cur(); // normaliza viewTab si la pestaña ya no existe
        const photo = { id: uid(), img: compressImage(img), u: Date.now() };
        if (viewTab) {
          const d = days[HOME];
          const n = ((d && d.photos)||[]).filter(p => p.tab === viewTab).length;
          photo.tab = viewTab;
          photo.w = 420;
          photo.h = Math.round(420 * img.height / img.width);
          photo.x = 40 + (n%3)*60;
          photo.y = Math.max(0, Math.round(scrollArea.scrollTop / cssW * LW)) + 240 + (n%3)*60;
        }
        if (!day().photos) day().photos = [];
        day().photos.push(photo);
        local.save(days); pushPhoto(HOME, photo); sfx('photo'); render();
      };
      img.onerror = () => alert('No se pudo leer la imagen.');
      img.src = rd.result;
    };
    rd.readAsDataURL(file);
  }
  function removePhoto(id) {
    const d = days[HOME]; if (!d || !d.photos) return;
    d.photos = d.photos.filter(p => p.id !== id);
    local.save(days); deletePhotoRemote(id); render();
  }

  // ================= dibujo (lienzo a pantalla completa) =================
  const LW = 1000; // ancho lógico; la Y se guarda en la misma escala (relativa al ancho)
  const canvas = $('ink');
  const ctx = canvas.getContext('2d');
  const sheet = $('sheet');
  const scrollArea = $('scrollArea');
  let drawMode = false;
  let drawing = false, current = null;
  let penColor = '#1C1C1A', penSize = 6, eraser = false;
  let cssW = 1, cssH = 1;
  let tool = 'pen';            // 'pen' | 'move' (mover trazos y fotos dentro de una pestaña)
  let moveTarget = null, lastPt = null;
  let movingFree = false;      // arrastrando/redimensionando una foto libre
  const photoEls = new Map();  // id de foto -> elemento en la capa libre

  function resizeInk() {
    if (drawing || moveTarget || movingFree) return;
    const w = sheet.clientWidth, h = sheet.clientHeight;
    if (w === 0) return;
    cssW = w; cssH = h;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(w*dpr); canvas.height = Math.round(h*dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redraw();
    repositionPhotos();
  }
  function L2Px(pt) { return [ pt[0]/LW*cssW, pt[1]/LW*cssW ]; } // ambas coord escalan por ancho
  function toLogical(e) {
    const r = canvas.getBoundingClientRect();
    return [ Math.round((e.clientX-r.left)/r.width*LW*10)/10, Math.round((e.clientY-r.top)/r.width*LW*10)/10 ];
  }
  function drawStroke(s) {
    const p = s.p;
    ctx.globalCompositeOperation = s.e ? 'destination-out' : 'source-over';
    if (p.length === 1) { const a=L2Px(p[0]); ctx.beginPath(); ctx.arc(a[0],a[1], (s.s/LW*cssW)/2, 0, Math.PI*2); ctx.fillStyle=s.c; ctx.fill(); return; }
    ctx.strokeStyle = s.c; ctx.lineWidth = s.s/LW*cssW; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); const a0=L2Px(p[0]); ctx.moveTo(a0[0],a0[1]);
    for (let i=1;i<p.length-1;i++){ const a=L2Px(p[i]), b=L2Px(p[i+1]); ctx.quadraticCurveTo(a[0],a[1],(a[0]+b[0])/2,(a[1]+b[1])/2); }
    const last=L2Px(p[p.length-1]); ctx.lineTo(last[0],last[1]); ctx.stroke();
  }
  function redraw() {
    ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore();
    (curRead().strokes||[]).forEach(drawStroke);
    ctx.globalCompositeOperation = 'source-over';
  }

  // gestos: 1 dedo/ratón dibuja, 2 dedos desplazan (scroll)
  const pointers = new Map();
  let gesture = 'idle', panStartY = 0, panStartScroll = 0;
  function centroidY() { let s=0,n=0; pointers.forEach(v=>{ s+=v.y; n++; }); return n?s/n:0; }
  function startStroke(e) {
    drawing = true;
    current = { c: penColor, s: eraser?penSize*3:penSize, e: eraser?1:0, p: [toLogical(e)] };
    const c = cur(); if (!c.strokes) c.strokes = [];
    c.strokes.push(current); redraw();
  }
  function cancelStroke() { if (current) { const s=cur().strokes; if (s && s[s.length-1]===current) s.pop(); current=null; drawing=false; redraw(); } }
  function endStroke() { if (!drawing) return; drawing=false; current=null; persistDebounced(); updateSheetHeight(); }

  // mover: localizar el trazo o la foto bajo el punto (coordenadas lógicas)
  function distToStroke(pt, s) {
    let m = Infinity;
    for (const p of s.p) { const d = Math.hypot(p[0]-pt[0], p[1]-pt[1]); if (d < m) m = d; }
    return m;
  }
  function hitTest(pt) {
    const strokes = curRead().strokes || [];
    for (let i = strokes.length-1; i >= 0; i--) {
      const s = strokes[i];
      if (s.e) continue; // los trazos de goma no se mueven
      if (distToStroke(pt, s) <= Math.max(24, s.s*1.5)) return { type:'stroke', s };
    }
    if (viewTab) {
      const d = days[viewKey] || {};
      const ph = (d.photos||[]).filter(p => p.tab === viewTab);
      for (let i = ph.length-1; i >= 0; i--) {
        const p = ph[i];
        if (pt[0] >= p.x && pt[0] <= p.x + p.w && pt[1] >= p.y && pt[1] <= p.y + (p.h||p.w)) return { type:'photo', p };
      }
    }
    return null;
  }
  function endMove() {
    if (!moveTarget) return;
    if (moveTarget.type === 'stroke') persistDebounced();
    else { const p = moveTarget.p; p.u = Date.now(); local.save(days); pushPhoto(viewKey, p); }
    moveTarget = null;
  }

  canvas.addEventListener('pointerdown', e => {
    if (!drawMode) return;
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pointers.size === 1) {
      if (tool === 'move') { gesture='move'; lastPt = toLogical(e); moveTarget = hitTest(lastPt); }
      else { gesture='draw'; startStroke(e); }
    }
    else if (pointers.size === 2) {
      if (gesture==='draw') cancelStroke();
      moveTarget = null;
      gesture='pan'; panStartY=centroidY(); panStartScroll=scrollArea.scrollTop;
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (gesture==='pan' && pointers.size>=2) { scrollArea.scrollTop = panStartScroll + (panStartY - centroidY()); }
    else if (gesture==='draw' && pointers.size===1 && current) {
      const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      evs.forEach(ev => current.p.push(toLogical(ev))); redraw();
    }
    else if (gesture==='move' && pointers.size===1 && moveTarget) {
      const pt = toLogical(e); const dx = pt[0]-lastPt[0], dy = pt[1]-lastPt[1]; lastPt = pt;
      if (moveTarget.type === 'stroke') { moveTarget.s.p.forEach(p => { p[0]+=dx; p[1]+=dy; }); redraw(); }
      else { const p = moveTarget.p; p.x+=dx; p.y+=dy; const el = photoEls.get(p.id); if (el) positionItem(el, p, true); }
    }
  });
  function liftPointer(e) {
    if (!pointers.has(e.pointerId)) return;
    pointers.delete(e.pointerId);
    if (gesture==='draw' && pointers.size===0) { endStroke(); gesture='idle'; }
    else if (gesture==='move' && pointers.size===0) { endMove(); gesture='idle'; }
    else if (gesture==='pan' && pointers.size<2) { gesture='idle'; }
    if (pointers.size===0) gesture='idle';
  }
  canvas.addEventListener('pointerup', liftPointer);
  canvas.addEventListener('pointercancel', liftPointer);

  // ================= botonera flotante desplegable =================
  let fabOpen = false, taskInputOpen = false;
  function closeFab() { fabOpen = false; $('fabCluster').classList.remove('open'); $('fabMain').setAttribute('aria-expanded','false'); }
  function toggleFab() { fabOpen = !fabOpen; $('fabCluster').classList.toggle('open', fabOpen); $('fabMain').setAttribute('aria-expanded', fabOpen); }
  function openTaskInput() {
    taskInputOpen = true; $('newTaskRow').classList.remove('hidden');
    const inp = $('newTaskInput'); inp.focus();
  }
  function setDrawMode(on) {
    drawMode = on;
    canvas.className = 'ink ' + (on?'draw':'write');
    $('fabCluster').classList.toggle('drawing', on);
    $('fabMain').textContent = on ? '✓' : '+';
    $('dockTools').classList.toggle('show', on);
    scrollArea.style.overflowY = on ? 'hidden' : 'auto'; // en dibujo, el scroll es con dos dedos
    if (on) closeFab();
  }
  $('fabMain').onclick = () => { if (drawMode) { setDrawMode(false); return; } toggleFab(); };
  $('actWrite').onclick = () => { closeFab(); openTaskInput(); };
  $('actPhoto').onclick = () => { closeFab(); $('photoInput').click(); };
  $('actNote').onclick = () => { closeFab(); createNote(); };
  $('actDraw').onclick = () => { closeFab(); setDrawMode(true); };
  // cerrar la botonera al tocar fuera
  document.addEventListener('pointerdown', e => { if (fabOpen && !e.target.closest('#fabCluster')) closeFab(); }, true);
  // ocultar el input de tarea al salir si queda vacío
  $('newTaskInput').addEventListener('blur', () => { if (!$('newTaskInput').value.trim()) { taskInputOpen = false; $('newTaskRow').classList.add('hidden'); } });

  function setTool(t) { tool = t; $('moveBtn').classList.toggle('sel', t==='move'); }
  $('moveBtn').onclick = () => setTool(tool==='move' ? 'pen' : 'move');
  document.querySelectorAll('.swatch').forEach(b => { b.onclick = () => { document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); penColor=b.dataset.color; eraser=false; $('eraserBtn').classList.remove('sel'); setTool('pen'); }; });
  document.querySelectorAll('[data-size]').forEach(b => { b.onclick = () => { document.querySelectorAll('[data-size]').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); penSize=Number(b.dataset.size); setTool('pen'); }; });
  $('eraserBtn').onclick = () => { eraser=!eraser; $('eraserBtn').classList.toggle('sel', eraser); if (eraser) setTool('pen'); };
  $('undoBtn').onclick = () => { (cur().strokes||[]).pop(); redraw(); persistDebounced(); };
  $('clearBtn').onclick = () => { if (!confirm('¿Limpiar el dibujo de este pensamiento?')) return; cur().strokes=[]; redraw(); persist(); };

  // reajustar el lienzo cuando cambia la altura del contenido
  if (window.ResizeObserver) { new ResizeObserver(() => resizeInk()).observe(sheet); }

  // ================= dictado (Web Speech API) =================
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null, recActive = false;
  if (SR) {
    $('actMic').classList.remove('hidden');
    $('actMic').onclick = () => {
      closeFab();
      if (recActive) { rec && rec.stop(); return; }
      openTaskInput();
      rec = new SR(); rec.lang='es-ES'; rec.interimResults=true; rec.continuous=false;
      const input = $('newTaskInput');
      rec.onresult = ev => { let fin='', itm=''; for (const r of ev.results) { if (r.isFinal) fin+=r[0].transcript; else itm+=r[0].transcript; } input.value = (fin||itm); };
      rec.onerror = () => { recActive=false; $('actMic').classList.remove('rec'); };
      rec.onend = () => { recActive=false; $('actMic').classList.remove('rec'); if (input.value.trim()) { addItem(input.value.trim()); input.value=''; } };
      recActive = true; $('actMic').classList.add('rec'); try { rec.start(); } catch(e){ recActive=false; $('actMic').classList.remove('rec'); }
    };
  }

  // ================= fotos: input de archivo =================
  $('photoInput').onchange = e => { const f = e.target.files[0]; addPhotoFile(f); e.target.value=''; };

  // lightbox cerrar
  $('lightbox').onclick = () => $('lightbox').classList.remove('show');

  // ================= sonido =================
  function refreshSoundBtn() { $('soundBtn').textContent = soundOn ? '🔊 sonido: activado' : '🔇 sonido: apagado'; }
  $('soundBtn').onclick = () => { soundOn = !soundOn; local.setPref('agenda-sound', soundOn ? '1' : '0'); refreshSoundBtn(); if (soundOn) sfx('open'); };
  refreshSoundBtn();

  // ================= exportar / importar =================
  $('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(days)], { type:'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'agenda-backup-'+todayKey()+'.json'; a.click(); URL.revokeObjectURL(a.href);
  };
  $('importBtn').onclick = () => $('importFile').click();
  $('importFile').onchange = e => {
    const f = e.target.files[0]; if (!f) return; const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result); if (typeof data!=='object'||data===null) throw 0;
        Object.keys(data).forEach(k => {
          const rem = data[k];
          if (!days[k] || (rem.u||0) > (days[k].u||0)) {
            days[k] = rem; pushDay(k); (rem.photos||[]).forEach(p => pushPhoto(k, p));
          }
        });
        local.save(days); render(); alert('Copia importada.');
      } catch (err) { alert('El archivo no es una copia válida.'); }
    };
    r.readAsText(f); e.target.value='';
  };

  // ================= sync UI =================
  $('genKey').onclick = () => { const ch='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let k=''; const rnd=new Uint32Array(40); crypto.getRandomValues(rnd); for (let i=0;i<40;i++) k+=ch[rnd[i]%ch.length]; $('syncKey').value=k; };
  $('connectBtn').onclick = () => {
    local.setPref('agenda-fb-config', $('fbConfig').value.trim());
    local.setPref('agenda-sync-key', $('syncKey').value.trim());
    if (fb) { fb.unsub && fb.unsub(); fb.unsubP && fb.unsubP(); fb = null; }
    setSync('off','Conectando…'); connectSync();
  };

  // ================= eventos generales =================
  $('newTaskInput').addEventListener('keydown', e => { if (e.key==='Enter') { addItem(e.target.value); e.target.value=''; } });
  $('exitTab').onclick = () => { viewTab = null; setTool('pen'); sfx('drop'); render(); };
  $('dateName').onclick = () => {
    if (!viewTab) return;
    const t = cur(); const name = prompt('Nombre del pensamiento', t.name||'');
    if (name === null) return;
    t.name = name.trim() || t.name; persist(); render();
  };
  function closeSidebar() { $('sidebar').classList.remove('open'); $('toggleBtn').setAttribute('aria-expanded','false'); resizeInk(); }
  $('sidebarClose').onclick = closeSidebar;
  $('toggleBtn').onclick = () => { const open = $('sidebar').classList.toggle('open'); $('toggleBtn').setAttribute('aria-expanded', open); if (!open) resizeInk(); };
  window.addEventListener('resize', () => { updateSheetHeight(); resizeInk(); });
  // refresca la fecha de arriba (cambia sola a medianoche); no toca los pensamientos
  setInterval(() => { if (!viewTab) $('dateName').textContent = fmtName(todayKey()); }, 60000);

  // ================= init =================
  days = local.load(); if (typeof days!=='object'||days===null) days = {};
  // migra datos antiguos (por fecha) a la hoja única y los sincroniza una vez
  if (foldIntoHome() && !local.getPref('agenda-home-migrated')) {
    local.setPref('agenda-home-migrated', '1');
    local.save(days); pushDay(HOME);
    (days[HOME].photos||[]).forEach(p => pushPhoto(HOME, p));
  }
  $('fbConfig').value = local.getPref('agenda-fb-config')||'';
  $('syncKey').value = local.getPref('agenda-sync-key')||'';
  $('storageNote').textContent = localMode;
  render();
  connectSync();

  // ================= auto-actualización =================
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    const controlled = !!navigator.serviceWorker.controller;
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!controlled) return;              // primera instalación: no recargar
      if (refreshing) return; refreshing = true; location.reload();
    });
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update();
      setInterval(() => reg.update(), 60*60*1000);
    }).catch(() => {});
  }
})();
</script>
</body>
</html>
